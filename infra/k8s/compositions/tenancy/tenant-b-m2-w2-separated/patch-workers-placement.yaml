apiVersion: apps/v1
kind: Deployment
metadata:
  name: localai-rpc-a
  namespace: localai-benchmark
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - genai-pb-worker-03
---
