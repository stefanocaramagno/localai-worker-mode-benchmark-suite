apiVersion: v1
kind: ServiceAccount
metadata:
  name: mon-agent
  namespace: observability
  labels:
    app: mon-agent
    app.kubernetes.io/name: mon-agent
    app.kubernetes.io/component: metrics-annotation-agent
    app.kubernetes.io/version: v0.0.6
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mon-agent
  labels:
    app: mon-agent
    app.kubernetes.io/name: mon-agent
    app.kubernetes.io/component: metrics-annotation-agent
    app.kubernetes.io/version: v0.0.6
rules:
  - apiGroups: [""]
    resources: ["namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mon-agent
  labels:
    app: mon-agent
    app.kubernetes.io/name: mon-agent
    app.kubernetes.io/component: metrics-annotation-agent
    app.kubernetes.io/version: v0.0.6
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mon-agent
subjects:
  - kind: ServiceAccount
    name: mon-agent
    namespace: observability
