apiVersion: apps/v1
kind: Deployment
metadata:
  name: localai-rpc-a
  namespace: localai-benchmark
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - sc-app-01
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
---
