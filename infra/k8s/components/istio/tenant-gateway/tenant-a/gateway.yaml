apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: localai-gateway
  labels:
    localai.benchmark/tenant: tenant-a
    localai.benchmark/component: istio-gateway
    localai.benchmark/traffic-access-mode: gateway-routed
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      hostname: tenant-a.localai.local
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
