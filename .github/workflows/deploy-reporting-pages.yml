name: Deploy Reporting to GitHub Pages

"on":
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-reporting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-reporting:
    name: Deploy reporting site
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate reporting entry point
        shell: bash
        run: |
          set -euo pipefail

          required_paths=(
            "results/reporting/index.html"
            "results/reporting/report.md"
            "results/reporting/reporting-site-manifest.json"
            "results/reporting/reporting-manifest.json"
            "results/reporting/cycles"
            "scripts/validation/artifacts/validate-artifact-portability.sh"
          )

          missing=0
          for required_path in "${required_paths[@]}"; do
            if [ ! -e "${required_path}" ]; then
              echo "::error file=${required_path}::Required reporting artifact is missing."
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Validate reporting artifact portability
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/validation/artifacts/validate-artifact-portability.sh --results-root results/reporting

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Stage current reporting site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .pages-reporting-site
          mkdir -p .pages-reporting-site
          cp -R results/reporting/. .pages-reporting-site/
          rm -rf .pages-reporting-site/archive
          touch .pages-reporting-site/.nojekyll

      - name: Upload reporting site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages-reporting-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
