# Redacted proxmox-k3s v1.0.3 provider configuration example.
# Copy this file to the corresponding local/cluster.<profile>.local.yaml path and fill local Proxmox credentials.
# Local files must not be committed because they contain environment-specific access data.

proxmox:
  api_url: https://PROXMOX_HOST:8006/api2/json
  token_id: root@pam!iac
  token_secret: REPLACE_WITH_LOCAL_SECRET
  insecure_tls: true

template:
  name: ubuntu-24.04-template
  proxmox_node: minis01
  storage: pool01
  image_storage: local
  bridge: vmbr0
  ip: 192.168.1.140
  gateway: 192.168.1.254
  dns: 208.67.222.222
  subnet_mask: 24
  os: ubuntu-24.04
  vmid_base: 8200
  timeout_seconds: 1800

clusters:
  - name: genai-pb
    kubeconfig_path: ./config/cluster-access/generated/proxmox-k3s/c9-1cp-4w-8c16g/kubeconfig

    k3s:
      version: v1.35.3+k3s1
      extra_server_args: "--disable=traefik --disable=servicelb --embedded-registry --node-label=nodepool=management --node-taint=ManagementOnly=true:NoSchedule"
      taint_control_plane: false

    addons:
      monitoring:
        enabled: true
        prometheus_node_port: 32090
        grafana_node_port: 32000
        grafana_admin_password: "admin"

      mon_agent:
        enabled: true
        version: "v0.0.6"
        prometheus_url: "http://prometheus-stack-kube-prom-prometheus.observability:9090"
        scrape_period_seconds: 30
        promql_range: "5m"
        namespace_label_selector: "mon-agent/enabled=true"

      cluster_lens:
        enabled: true
        version: "v0.0.5"
        node_port: 32088
        refresh: "2s"

      mentat:
        enabled: true
        version: "v0.3.0"
        sleep_seconds: 5
        ping_attempts: 5
        ping_timeout_seconds: 1
        bandwidth_port: 2113
        bandwidth_bytes: 262144
        bandwidth_interval_seconds: 90
        bandwidth_jitter_seconds: 30
        bandwidth_timeout_seconds: 30

      istio:
        enabled: true

      chaos_mesh:
        enabled: true
        dashboard_node_port: 32300

    control_plane:
      - template: ubuntu-24.04-template
        name: cp-01
        proxmox_node: minis02
        storage: pool01
        bridge: vmbr0
        cores: 2
        memory: 4096
        disk_size: 20
        ip: 192.168.1.141
        gateway: 192.168.1.254
        dns: 208.67.222.222
        subnet_mask: 24

    workers:
      - template: ubuntu-24.04-template
        name: worker-01
        proxmox_node: minis03
        storage: pool01
        bridge: vmbr0
        cores: 8
        memory: 16384
        disk_size: 35
        ip: 192.168.1.142
        gateway: 192.168.1.254
        dns: 208.67.222.222
        subnet_mask: 24
        labels:
          - nodepool=workers
        taints: []

      - template: ubuntu-24.04-template
        name: worker-02
        proxmox_node: minis04
        storage: pool01
        bridge: vmbr0
        cores: 8
        memory: 16384
        disk_size: 35
        ip: 192.168.1.143
        gateway: 192.168.1.254
        dns: 208.67.222.222
        subnet_mask: 24
        labels:
          - nodepool=workers
        taints: []

      - template: ubuntu-24.04-template
        name: worker-03
        proxmox_node: minis05
        storage: pool01
        bridge: vmbr0
        cores: 8
        memory: 16384
        disk_size: 35
        ip: 192.168.1.144
        gateway: 192.168.1.254
        dns: 208.67.222.222
        subnet_mask: 24
        labels:
          - nodepool=workers
        taints: []

      - template: ubuntu-24.04-template
        name: worker-04
        proxmox_node: minis06
        storage: pool01
        bridge: vmbr0
        cores: 8
        memory: 16384
        disk_size: 35
        ip: 192.168.1.145
        gateway: 192.168.1.254
        dns: 208.67.222.222
        subnet_mask: 24
        labels:
          - nodepool=workers
        taints: []
